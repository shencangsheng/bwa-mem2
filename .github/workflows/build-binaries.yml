# Ship one CentOS 7-compatible tar.bz2 file per release:
#
#   bwa-mem2-<ver>_centos7_x64-linux.tar.bz2
#     manylinux2014 / glibc 2.17 — CentOS 7 / RHEL 7+
#     root = upstream v2.2.1 Intel ISA siblings + super-dispatcher
#     extra/gcc-full = AMD / Intel AVX-512 without CLWB fallback
#
# See Makefile.platforms and:
#   https://github.com/bwa-mem2/bwa-mem2/issues/160
#   https://github.com/bwa-mem2/bwa-mem2/issues/236

name: Build multi-ISA binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Upload artifacts to a GitHub Release (tag push always releases)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  MANYLINUX_IMAGE: quay.io/pypa/manylinux2014_x86_64
  UPSTREAM_BINARY_VERSION: "2.2.1"
  UPSTREAM_BINARY_SHA256: b4cfdbce8cc07cdf3f6a920facabc29c976cf77dd53573369508111d6d1c555b

jobs:
  stage-upstream-official:
    name: Stage upstream v2.2.1 binaries
    runs-on: ubuntu-22.04
    steps:
      - name: Download and verify upstream release
        run: |
          set -euo pipefail
          archive="bwa-mem2-${UPSTREAM_BINARY_VERSION}_x64-linux.tar.bz2"
          url="https://github.com/bwa-mem2/bwa-mem2/releases/download/v${UPSTREAM_BINARY_VERSION}/${archive}"
          curl --fail --location --retry 3 --output "${archive}" "${url}"
          echo "${UPSTREAM_BINARY_SHA256}  ${archive}" | sha256sum --check -
          tar -xjf "${archive}"

          source_dir="bwa-mem2-${UPSTREAM_BINARY_VERSION}_x64-linux"
          stage_dir="stage/c7-intel-official"
          mkdir -p "${stage_dir}"
          for name in sse41 sse42 avx avx2 avx512bw; do
            bin="${source_dir}/bwa-mem2.${name}"
            test -x "${bin}"
            max_glibc="$(
              objdump -T "${bin}" |
                awk 'match($0, /GLIBC_[0-9.]+/) { print substr($0, RSTART + 6, RLENGTH - 6) }' |
                sort -Vu |
                awk 'END { print }'
            )"
            echo "${bin}: max GLIBC_${max_glibc}"
            if [[ "$(printf '%s\n' "${max_glibc}" "2.17" | sort -V | awk 'END { print }')" != "2.17" ]]; then
              echo "ERROR: ${bin} requires GLIBC_${max_glibc}" >&2
              exit 1
            fi
            cp -a "${bin}" "${stage_dir}/"
          done
          {
            echo "source=upstream bwa-mem2 v${UPSTREAM_BINARY_VERSION}"
            echo "url=${url}"
            echo "sha256=${UPSTREAM_BINARY_SHA256}"
            echo "glibc_ceiling=2.17"
            echo "role=official Intel-optimized ISA siblings"
          } > "${stage_dir}/BUILD_INFO.txt"

      - name: Upload official ISA siblings
        uses: actions/upload-artifact@v4
        with:
          name: bin-c7-intel-official
          path: stage/c7-intel-official
          if-no-files-found: error

  # ── CentOS 7 / glibc 2.17 (manylinux2014) ─────────────────────────────
  build-centos7-bundle:
    name: C7 Bundle ${{ matrix.artifact }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: gcc-multi
            artifact: c7-root-gcc-multi
          - platform: gcc-avx2
            artifact: c7-gcc-avx2-fleet
    steps:
      - name: Checkout (with safestringlib submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build in manylinux2014
        run: |
          chmod +x scripts/ci-manylinux-build.sh
          docker run --rm \
            -v "$PWD":/src \
            -w /src \
            "${MANYLINUX_IMAGE}" \
            bash scripts/ci-manylinux-build.sh \
              "${{ matrix.platform }}" \
              "${{ matrix.artifact }}"

      - name: Upload staged binaries
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.artifact }}
          path: stage/${{ matrix.artifact }}
          if-no-files-found: error

  build-centos7-single:
    name: C7 Single ${{ matrix.artifact }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: gcc-sse41
            artifact: c7-sse41
          - platform: gcc-sse42
            artifact: c7-sse42
          - platform: gcc-avx
            artifact: c7-avx
          - platform: gcc-avx2-bin
            artifact: c7-avx2
          - platform: gcc-avx512bw
            artifact: c7-avx512bw
    steps:
      - name: Checkout (with safestringlib submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build in manylinux2014
        run: |
          chmod +x scripts/ci-manylinux-build.sh
          docker run --rm \
            -v "$PWD":/src \
            -w /src \
            "${MANYLINUX_IMAGE}" \
            bash scripts/ci-manylinux-build.sh \
              "${{ matrix.platform }}" \
              "${{ matrix.artifact }}"

      - name: Upload staged binaries
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.artifact }}
          path: stage/${{ matrix.artifact }}
          if-no-files-found: error

  # ── Package the CentOS 7-compatible release ───────────────────────────
  package:
    name: Assemble CentOS 7 tar.bz2
    needs:
      - stage-upstream-official
      - build-centos7-bundle
      - build-centos7-single
    outputs:
      version: ${{ steps.assemble.outputs.version }}
      release_tag: ${{ steps.assemble.outputs.release_tag }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout (docs / scripts)
        uses: actions/checkout@v4

      - name: Download all staged binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: false

      - name: Assemble CentOS 7 package
        id: assemble
        run: |
          VERSION="${GITHUB_REF_NAME}"
          case "${VERSION}" in
            v*)
              RELEASE_TAG="${VERSION}"
              ;;
            *)
              VERSION="sha-${GITHUB_SHA::8}"
              RELEASE_TAG="build-${GITHUB_SHA}"
              ;;
          esac
          chmod +x scripts/ci-package.sh
          mkdir -p release-out
          scripts/ci-package.sh "${VERSION}" dist release-out
          ls -lh release-out/*.tar.bz2
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Upload release tarballs
        uses: actions/upload-artifact@v4
        with:
          name: bwa-mem2-x64-linux
          path: release-out/*.tar.bz2
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [package]
    runs-on: ubuntu-22.04
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release)
    steps:
      - name: Download release tarballs
        uses: actions/download-artifact@v4
        with:
          name: bwa-mem2-x64-linux
          path: release-assets

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.package.outputs.release_tag }}
          name: bwa-mem2 binaries ${{ needs.package.outputs.version }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          generate_release_notes: true
          body: |
            ## CentOS 7-compatible Linux package

            | File | Runs on | Root |
            |------|---------|------|
            | `bwa-mem2-${{ needs.package.outputs.version }}_centos7_x64-linux.tar.bz2` | **CentOS 7 / RHEL 7+** (glibc 2.17) | Official Intel + GCC fallback |

            The dispatcher and GCC fallback are built in manylinux2014; the
            pinned upstream v2.2.1 Intel siblings are verified against the same
            glibc 2.17 ceiling. AMD EPYC and Intel AVX-512 CPUs without CLWB
            automatically use `extra/bwa-mem2.gcc-full`.

            ### Usage (CentOS 7 example)

            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ needs.package.outputs.release_tag }}/bwa-mem2-${{ needs.package.outputs.version }}_centos7_x64-linux.tar.bz2 \
              | tar jxf -
            bwa-mem2-${{ needs.package.outputs.version }}_centos7_x64-linux/bwa-mem2 mem ref.fa r1.fq r2.fq > out.sam
            bwa-mem2-${{ needs.package.outputs.version }}_centos7_x64-linux/bwa-mem2 which
            ```
          files: release-assets/*.tar.bz2
