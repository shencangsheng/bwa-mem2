# Build SIMD-specific bwa-mem2 binaries via platform Makefiles
# (upstream Makefile is left untouched).
#
#   make -f Makefile.platforms PLATFORM=<name>
#
# See Makefile.platforms and issues:
#   https://github.com/bwa-mem2/bwa-mem2/issues/160  (CLWB)
#   https://github.com/bwa-mem2/bwa-mem2/issues/236  (AMD Zen4 / Intel -x)

name: Build multi-ISA binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Upload artifacts to a GitHub Release (tag push always releases)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-bundle:
    name: Bundle ${{ matrix.platform }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: gcc-multi
            artifact: gcc-full
            compiler: gcc
          - platform: gcc-avx2
            artifact: gcc-avx2-fleet
            compiler: gcc
          # Official-style: make CXX=icpc multi (AVX-512 uses -xCORE-AVX512 / CLWB)
          - platform: intel-multi
            artifact: intel-official
            compiler: intel
          # icpc AVX-512 via -march=skylake-avx512 (no CLWB gate)
          - platform: intel-avx512-noclwb
            artifact: intel-avx512-noclwb
            compiler: intel
    steps:
      - name: Checkout (with safestringlib submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential zlib1g-dev curl ca-certificates gnupg

      - name: Install Intel oneAPI C++ (official icpc multi)
        if: matrix.compiler == 'intel'
        run: |
          curl -sS -L https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            intel-oneapi-compiler-dpcpp-cpp

          # Upstream Makefile keys off CXX=icpc for -xCORE-AVX512; oneAPI ships icpx/icx.
          set +e
          # shellcheck disable=SC1091
          source /opt/intel/oneapi/setvars.sh
          set -e

          ICPX="$(command -v icpx || true)"
          ICX="$(command -v icx || true)"
          if [[ -z "${ICPX}" || -z "${ICX}" ]]; then
            for d in /opt/intel/oneapi/compiler/*/bin/compiler /opt/intel/oneapi/compiler/*/bin; do
              [[ -x "${d}/icpx" ]] && ICPX="${d}/icpx"
              [[ -x "${d}/icx" ]] && ICX="${d}/icx"
            done
          fi
          test -n "${ICPX}" && test -n "${ICX}"
          sudo ln -sfn "${ICPX}" /usr/local/bin/icpc
          sudo ln -sfn "${ICX}" /usr/local/bin/icc
          # Drivers + libs for later steps (Build also re-sources setvars.sh)
          echo "/usr/local/bin" >> "${GITHUB_PATH}"
          dirname "${ICPX}" >> "${GITHUB_PATH}"
          dirname "${ICX}" >> "${GITHUB_PATH}"
          icpc --version
          icc --version

      - name: Build PLATFORM=${{ matrix.platform }}
        run: |
          if [[ "${{ matrix.compiler }}" == "intel" ]]; then
            if [[ -f /opt/intel/oneapi/setvars.sh ]]; then
              # shellcheck disable=SC1091
              source /opt/intel/oneapi/setvars.sh
            fi
          fi
          make -f Makefile.platforms PLATFORM="${{ matrix.platform }}"
          ls -lh bwa-mem2 bwa-mem2.* || true
          file bwa-mem2 bwa-mem2.* || true

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          case "${VERSION}" in
            v*) ;;
            *) VERSION="sha-${GITHUB_SHA::8}" ;;
          esac
          PKG="bwa-mem2-${VERSION}_${{ matrix.artifact }}_x64-linux"
          mkdir -p "${PKG}"
          for b in bwa-mem2 bwa-mem2.sse41 bwa-mem2.sse42 bwa-mem2.avx \
                   bwa-mem2.avx2 bwa-mem2.avx512bw; do
            [[ -e "$b" ]] && cp -a "$b" "${PKG}/"
          done
          cp -a scripts/select-binary.sh README.md LICENSE "${PKG}/"
          chmod +x "${PKG}"/bwa-mem2* "${PKG}/select-binary.sh" 2>/dev/null || true
          {
            echo "platform=${{ matrix.platform }}"
            echo "compiler=${{ matrix.compiler }}"
            echo "artifact=${{ matrix.artifact }}"
            if command -v icpc >/dev/null 2>&1; then icpc --version | head -n1; fi
            if command -v g++ >/dev/null 2>&1; then g++ --version | head -n1; fi
          } > "${PKG}/BUILD_INFO.txt"
          tar -cjf "${PKG}.tar.bz2" "${PKG}"
          echo "ARTIFACT=${PKG}.tar.bz2" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bwa-mem2-${{ matrix.artifact }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  build-single:
    name: Single ${{ matrix.platform }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        platform:
          - gcc-sse41
          - gcc-sse42
          - gcc-avx
          - gcc-avx2-bin
          - gcc-avx512bw
    steps:
      - name: Checkout (with safestringlib submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential zlib1g-dev

      - name: Build PLATFORM=${{ matrix.platform }}
        run: |
          make -f Makefile.platforms clean || true
          make -f Makefile.platforms PLATFORM="${{ matrix.platform }}"
          ls -lh bwa-mem2*
          file bwa-mem2*

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          case "${VERSION}" in
            v*) ;;
            *) VERSION="sha-${GITHUB_SHA::8}" ;;
          esac
          ISA="${{ matrix.platform }}"
          ISA="${ISA#gcc-}"
          ISA="${ISA%-bin}"
          PKG="bwa-mem2-${VERSION}_${ISA}_x64-linux"
          mkdir -p "${PKG}"
          cp -a bwa-mem2 README.md LICENSE "${PKG}/"
          for b in bwa-mem2.*; do
            [[ -e "$b" ]] && cp -a "$b" "${PKG}/"
          done
          chmod +x "${PKG}"/bwa-mem2*
          tar -cjf "${PKG}.tar.bz2" "${PKG}"
          echo "ARTIFACT=${PKG}.tar.bz2" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bwa-mem2-${{ matrix.platform }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-bundle, build-single]
    runs-on: ubuntu-22.04
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release)
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten tarballs
        run: |
          mkdir -p release-assets
          find dist -type f -name '*.tar.bz2' -exec cp -a {} release-assets/ \;
          ls -lh release-assets/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.sha) }}
          name: bwa-mem2 binaries ${{ github.ref_name }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          generate_release_notes: true
          body: |
            ## Multi-ISA Linux x86_64 (`Makefile.platforms`)

            Upstream `Makefile` unchanged:
            ```bash
            make -f Makefile.platforms PLATFORM=<name>
            ```

            ### Bundles

            | Package / PLATFORM | Toolchain | Notes |
            |--------------------|-----------|-------|
            | `gcc-full` / `gcc-multi` | GCC | Full set + dispatcher; no CLWB gate |
            | `gcc-avx2-fleet` / `gcc-avx2` | GCC | Up to AVX2 (AMD Zen1–Zen3 / Intel AVX2) |
            | `intel-official` / `intel-multi` | Intel oneAPI (`icpc`→`icpx`) | Same as upstream `make CXX=icpc multi`; AVX-512 needs CLWB + Intel CPU ([#160](https://github.com/bwa-mem2/bwa-mem2/issues/160), [#236](https://github.com/bwa-mem2/bwa-mem2/issues/236)) |
            | `intel-avx512-noclwb` / `intel-avx512-noclwb` | Intel oneAPI | Single AVX-512 via `-march=skylake-avx512` (no CLWB) |

            ### Single-ISA (GCC)

            `sse41` / `sse42` / `avx` / `avx2` / `avx512bw` — pin one binary per ECS image.

            ```bash
            ./bwa-mem2.avx2 mem ...
            ./select-binary.sh . mem ref.fa r1.fq r2.fq
            ```
          files: release-assets/*.tar.bz2
